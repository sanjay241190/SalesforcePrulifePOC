name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    uses: sanjay241190/ci-cd-pipelines/.github/workflows/VALIDATE_PULL_REQUEST.yml@main
    with:
      source_branch: ${{ github.head_ref }}
      target_branch: ${{ github.base_ref }}
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      SF_AUTH_URL_DEV: ${{ secrets.SF_AUTH_URL_DEV }}
      SF_AUTH_URL_UAT: ${{ secrets.SF_AUTH_URL_UAT }}
      GH_PAT_CI_CD_PIPELINES_REPO_SECRET : ${{ secrets.GH_PAT_CI_CD_PIPELINES_REPO }}
      GH_TOKEN: ${{ secrets.FINE_GRAIN_AI_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      
